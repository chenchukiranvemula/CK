<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Forever ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: Georgia, serif;
            background: linear-gradient(180deg, #120018, #3d0b3d);
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #bg span {
            position: absolute;
            color: #ff8fb1;
            animation: f 8s linear infinite;
        }
        @keyframes f {
            from { transform: translateY(110vh); }
            to { transform: translateY(-20vh); }
        }
        .card {
            width: 92%;
            max-width: 700px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 0 30px #0008;
        }
        #env {
            cursor: pointer;
            padding: 18px;
            border: 2px solid #fff;
            border-radius: 16px;
            display: inline-block;
            transition: .3s;
        }
        #env:hover {
            transform: scale(1.08);
            box-shadow: 0 0 20px #ff5ea8;
        }
        #letter {
            display: none;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
            text-align: left;
            white-space: pre-wrap;
            line-height: 1.7;
            margin-top: 18px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            50% { transform: scale(1.04); }
        }
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.8); }
        }
    </style>
</head>
<body>
    <div id="bg"></div>
    <div class="card">
        <h1>❤️ I Love You ❤️</h1>
        <div id="env" onclick="openLetter()">💌 Click to Open My Heart</div>
        <div id="letter"></div>
    </div>

    <!-- Optional: Add your music.mp3 later or remove the audio tag -->
    <!-- <audio autoplay loop><source src="music.mp3"></audio> -->

    <script>
        // Floating hearts
        for(let i = 0; i < 50; i++) {
            let s = document.createElement('span');
            s.innerHTML = '❤';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.fontSize = (10 + Math.random() * 25) + 'px';
            s.style.animationDuration = (4 + Math.random() * 6) + 's';
            document.getElementById('bg').appendChild(s);
        }

        const text = `My Love,

If I could pause time, I would choose every moment where you smiled.

You have become a part of my heart in a way words can never fully explain. Your happiness makes my world brighter, and your tears would always matter to me.

No matter how many days pass, my feelings for you only grow stronger. You are the reason ordinary moments become beautiful memories.

Whenever life becomes difficult, I hope you remember that there is someone who believes in you, cares for you deeply, and silently thanks the universe every day for bringing you into my life.

I don't promise a perfect journey, but I promise that my love, respect, and care for you will always be genuine.

If one sentence could describe everything in my heart, it would simply be...

I LOVE YOU.

Today.
Tomorrow.
Forever.

❤️ Yours, Always ❤️`;

        function openLetter() {
            document.getElementById('env').style.display = 'none';
            const letter = document.getElementById('letter');
            letter.style.display = 'block';
            let i = 0;
            let t = setInterval(() => {
                letter.textContent += text[i++] || '';
                if (i > text.length) clearInterval(t);
            }, 28);
        }

        // Twinkling stars
        for(let i = 0; i < 80; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            star.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(star);
        }
    </script>
</body>
</html>
